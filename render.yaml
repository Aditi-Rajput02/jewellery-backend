services:
  - type: web
    name: bg-jewels-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port ${PORT:-8000}
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DATABASE
        value: jewellery
      - key: PYTHON_VERSION
        value: 3.11.0
